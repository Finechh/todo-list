syntax = "proto3";

package todo.v1;

option go_package = "todo_list/internal/grpc/todopb;todopb";

message Todo {
  string id = 1;
  string title = 2;
  string description = 3;
  bool completed = 4;
}

message GetTodoRequest {
  string id = 1;
}

message GetTodoResponse {
  Todo todo = 1;
}

message CreateTodoRequest {
  string title = 1;
  string description = 2;
}

message CreateTodoResponse {
  Todo todo = 1;
}

message UpdateTodoRequest {
  string id = 1;
  string title = 2;
  string description = 3;
}

message UpdateTodoResponse {
  Todo todo = 1;
}

message MarkTodoCompletedRequest {
  string id = 1;
  bool completed = 2;
}

message MarkTodoCompletedResponse{
  Todo todo = 1;
}

service TodoService {
  rpc GetTodo(GetTodoRequest) returns (GetTodoResponse);
  rpc CreateTodo(CreateTodoRequest) returns (CreateTodoResponse);
  rpc UpdateTodo(UpdateTodoRequest) returns (UpdateTodoResponse);
  rpc MarkTodoCompleted(MarkTodoCompletedRequest) returns (MarkTodoCompletedResponse);
}